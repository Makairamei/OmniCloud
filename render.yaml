services:
  # Backend API (Docker)
  - type: web
    name: omnicloud-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free # Menggunakan plan Free agar gratis tanpa billing
    envVars:
      - key: PORT
        value: 8787
      - key: DATABASE_PATH
        value: /app/data/omnicloud.db
      - key: APP_MODE
        value: local

  # Frontend Web (Static)
  - type: web
    name: omnicloud-frontend
    runtime: static
    buildCommand: npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://omnicloud-backend.onrender.com/api
