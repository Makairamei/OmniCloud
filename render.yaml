services:
  # Backend API (Docker)
  - type: web
    name: omnicloud-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: starter # Menggunakan plan Starter (paid) agar mendukung harddisk persisten
    envVars:
      - key: PORT
        value: 8787
      - key: DATABASE_PATH
        value: /app/data/omnicloud.db
      - key: APP_MODE
        value: hosted # Diubah ke hosted agar Anda bisa membuat akun permanen sendiri
    disk:
      name: omnicloud-data
      mountPath: /app/data
      sizeGB: 1
      - key: CORS_ORIGIN
        sync: false # Render akan meminta Anda memasukkan ini saat deploy
      - key: FRONTEND_URL
        sync: false # Render akan meminta Anda memasukkan ini saat deploy

  # Frontend Web (Static)
  - type: web
    name: omnicloud-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Render akan meminta Anda memasukkan ini saat deploy
